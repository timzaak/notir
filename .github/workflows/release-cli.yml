name: Release CLI

on:
  push:
    tags: ['v*.*.*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.89
        targets: ${{ matrix.target }}

    - name: Install cross
      if: matrix.use_cross
      run: cargo install cross --locked

    - name: Build (cross)
      if: matrix.use_cross
      run: cross build --release -p notir-cli --target ${{ matrix.target }}

    - name: Build (native)
      if: '!matrix.use_cross'
      run: cargo build --release -p notir-cli --target ${{ matrix.target }}

    - name: Package binary (Unix)
      if: runner.os != 'Windows'
      run: |
        cd target/${{ matrix.target }}/release
        tar czf notir-cli-${{ matrix.target }}.tar.gz notir-cli

    - name: Package binary (Windows)
      if: runner.os == 'Windows'
      run: |
        cd target/${{ matrix.target }}/release
        7z a notir-cli-${{ matrix.target }}.zip notir-cli.exe

    - uses: actions/upload-artifact@v4
      with:
        name: notir-cli-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/notir-cli-${{ matrix.target }}.*

  release:
    needs: build-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Generate SHA256 checksums
      run: |
        cd artifacts
        find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec sha256sum {} \; > ../SHA256SUMS
    - uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/**/*
          SHA256SUMS
